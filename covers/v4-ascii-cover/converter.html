<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image to ASCII Converter — Momentum Issue 006</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #e8e8e0;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      padding: 40px;
      line-height: 1.2;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 24px;
      color: #00ffff;
    }

    .controls {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input[type="file"],
    select {
      padding: 8px 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e8e8e0;
      border-radius: 4px;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      cursor: pointer;
    }

    button {
      padding: 10px 20px;
      background: #00ffff;
      color: #000;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }

    button:hover {
      background: #00cccc;
      transform: scale(1.05);
    }

    button:disabled {
      background: #666;
      color: #999;
      cursor: not-allowed;
      transform: scale(1);
    }

    #canvas {
      background: #0a0a0a;
      border: 1px solid #333;
      margin-bottom: 30px;
      max-width: 100%;
      display: block;
    }

    #ascii-output {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 20px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 10px;
      line-height: 1.1;
      white-space: pre;
      color: #e8e8e0;
      max-height: 600px;
      overflow-y: auto;
    }

    .info {
      color: #aaa;
      font-size: 12px;
      margin-top: 15px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.02);
      border-left: 2px solid #00ffff;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎨 Image → ASCII Converter</h1>

    <div class="controls">
      <div class="control-group">
        <label for="imageInput">Upload Image</label>
        <input type="file" id="imageInput" accept="image/*">
      </div>

      <div class="control-group">
        <label for="resolution">Resolution</label>
        <select id="resolution">
          <option value="LOW">Low (42×15)</option>
          <option value="MEDIUM" selected>Medium (64×48)</option>
          <option value="HIGH">High (80×60)</option>
        </select>
      </div>

      <div class="control-group">
        <label for="charset">Character Set</label>
        <select id="charset">
          <option value="MINIMAL">Minimal</option>
          <option value="LOW">Low</option>
          <option value="MEDIUM">Medium</option>
          <option value="BOLD" selected>Bold</option>
        </select>
      </div>

      <button id="convertBtn" disabled>Convert to ASCII</button>
      <button id="downloadBtn" disabled>Download as Text</button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <div id="ascii-output" style="display:none;"></div>

    <div class="info" id="info" style="display:none;"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.0/lib/p5.min.js"></script>
  <script>
    const ASCII_SETS = {
      MINIMAL: ' .-=+*#█',
      LOW: '@#*+=-:. ',
      MEDIUM: '$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\\|()1{}[]?-_+~<>i!lI;:,^`\'. ',
      BOLD: '█▓▒░$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\\|()1{}[]?-_+~<>i!lI;:,^`\'. ',
    };

    const RESOLUTIONS = {
      ULTRA_LOW: { width: 32, height: 32 },
      LOW: { width: 42, height: 15 },
      MEDIUM: { width: 64, height: 48 },
      HIGH: { width: 80, height: 60 },
    };

    let img = null;
    let asciiOutput = '';

    function calculateBrightness(r, g, b) {
      return (r * 299 + g * 587 + b * 114) / 1000;
    }

    function getAsciiChar(brightness, charSet) {
      const index = Math.floor((brightness / 255) * (charSet.length - 1));
      return charSet.charAt(charSet.length - 1 - index) || ' ';
    }

    document.getElementById('imageInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          const imgElement = new Image();
          imgElement.onload = () => {
            img = imgElement;
            document.getElementById('convertBtn').disabled = false;
            document.getElementById('info').textContent = `✓ Image loaded: ${file.name} (${imgElement.width}×${imgElement.height}px)`;
            document.getElementById('info').style.display = 'block';
          };
          imgElement.src = event.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    document.getElementById('convertBtn').addEventListener('click', () => {
      if (!img) return;

      const resolution = document.getElementById('resolution').value;
      const charset = document.getElementById('charset').value;
      const dims = RESOLUTIONS[resolution];
      const charSet = ASCII_SETS[charset];

      // Create canvas and context
      const canvas = document.getElementById('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      // Resize to target resolution
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = dims.width;
      tempCanvas.height = dims.height;
      const tempCtx = tempCanvas.getContext('2d');
      tempCtx.drawImage(img, 0, 0, dims.width, dims.height);

      // Get pixel data
      const imageData = tempCtx.getImageData(0, 0, dims.width, dims.height);
      const data = imageData.data;

      // Convert to ASCII
      asciiOutput = '';
      for (let i = 0; i < data.length; i += 4) {
        if (i > 0 && (i / 4) % dims.width === 0) {
          asciiOutput += '\n';
        }
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];
        const brightness = calculateBrightness(r, g, b);
        const char = getAsciiChar(brightness, charSet);
        asciiOutput += char;
      }

      // Display
      const output = document.getElementById('ascii-output');
      output.textContent = asciiOutput;
      output.style.display = 'block';

      document.getElementById('downloadBtn').disabled = false;
      document.getElementById('info').textContent = `✓ Converted: ${dims.width}×${dims.height} characters, ${charset} charset`;
      document.getElementById('info').style.display = 'block';
    });

    document.getElementById('downloadBtn').addEventListener('click', () => {
      if (!asciiOutput) return;

      const element = document.createElement('a');
      element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(asciiOutput));
      element.setAttribute('download', `momentum-cover-ascii-${new Date().toISOString().split('T')[0]}.txt`);
      element.style.display = 'none';
      document.body.appendChild(element);
      element.click();
      document.body.removeChild(element);
    });
  </script>
</body>
</html>
